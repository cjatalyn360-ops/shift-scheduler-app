<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Management</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="app-topbar">
      <div class="topbar-left">
        <a href="dashboard.html" class="brand-wrap">
          <img
            src="tasktopus_logo.png"
            alt="Tasktopus logo"
            class="brand-logo small-logo"
          />
        </a>
      </div>
      <div class="topbar-center">
        <h1 class="topbar-title">Tasktopus</h1>
      </div>
      <div class="topbar-right"></div>
    </header>

    <nav class="app-nav">
      <div class="app-nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="VisualGraphs.html">Visual Graphs</a>
        <a href="Calendar.html">Calendar</a>
        <a href="Messages.html">Messages</a>
        <a href="Account.html">Account</a>
      </div>
    </nav>

    <main class="app-main">
      <div>
        <h1>Welcome to the Dashboard!</h1>
      </div>

      <!-- this is a new comment -->

      <!-- Adding Employees-->
      <div class="add-employee-container">
        <h2>Add Employees</h2>

        <!-- all inputs is required to be filled before adding employees-->

        <label class="add-employee-label" for="FirstName">Enter First Name:</label>
        <input
          class="add-employee-input"
          id="FirstName"
          placeholder="First Name"
          required
        />
        <label class="add-employee-label" for="LastName">Enter Last Name:</label>
        <input
          class="add-employee-input"
          id="LastName"
          placeholder="Last Name"
          required
        />
        <label class="add-employee-label" for="DateOfBirth">Enter Date of Birth</label>
        <input
          class="add-employee-input"
          id="DateOfBirth"
          type="date"
          placeholder="Date Of Birth"
          required
        />
        <label class="add-employee-label" for="Position">Enter Employee Position</label>
        <input
          class="add-employee-input"
          id="Position"
          placeholder="Position"
          required
        />
        <label class="add-employee-label" for="HourlyWage">Enter Hourly Wage (e.g. 14.34) </label>
        <input
          class="add-employee-input"
          id="HourlyWage"
          placeholder="Hourly Wage"
          required
        />
        <label class="add-employee-label" for="Email">Enter Employee Email</label>
        <input
          class="add-employee-input"
          id="Email"
          type="email"
          placeholder="Email"
          required
        />
        <label class="add-employee-label" for="PhoneNumber"
          >Enter Employee Phone Number (e.g. 123-345-6789)</label
        >
        <input
          class="add-employee-input"
          id="PhoneNumber"
          placeholder="Phone Number"
          required
        />

        <button onclick="handleAddEmployee()">Add Employee</button>
      </div>


    

      <div>
        <div class= "table-controls">
          <label class="number-employees-displayed-label" for="NumberEmployeesDisplayed">Display # of employees:</label>
          <select id="NumberEmployeesDisplayed">
            <option value ="5">5</option>
            <option value ="25">25</option>
            <option value ="50">50</option>
            <option value ="100">100</option>
            <option value ="all">All</option>
          </select>
        </div>

        <table class="employee-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Position</th>
              <th>Hourly Wage</th>
              <th>Email</th>
              <th>Phone Number</th>
              <th>Remove Employee</th>
            </tr>
          </thead>
          <tbody id="EmployeeTable"></tbody>
        </table>
      </div>

      <div class="search-employee-container">
        <h2>Search Employee</h2>

        <label class="search-employee-label" for="FirstName">Enter First Name:</label>
        <input
          class="search-employee-input"
          id="SearchFirstName"
          placeholder="First Name"
          required
        />

        <button class="search-employee-button" onclick="handleSearchEmployee()">
          Search Employee
        </button>

        <table class="employee-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Position</th>
              <th>Hourly Wage</th>
              <th>Email</th>
              <th>Phone Number</th>
              <th>Remove Employee</th>
            </tr>
          </thead>
          <tbody id="SearchEmployeeTable"></tbody>
        </table>
      </div>
    </main>

    <script src="Algorithm.js"></script>
  </body>
</html>
