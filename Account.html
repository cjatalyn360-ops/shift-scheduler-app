<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account - Tasktopus</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="app-topbar">
      <div class="topbar-left">
        <a href="dashboard.html" class="brand-wrap">
          <img
            src="tasktopus_logo.png"
            alt="Tasktopus logo"
            class="brand-logo small-logo"
          />
        </a>
      </div>
      <div class="topbar-center">
        <h1 class="topbar-title">Tasktopus</h1>
      </div>
      <div class="topbar-right"></div>
    </header>

    <nav class="app-nav">
      <div class="app-nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="VisualGraphs.html">Visual Graphs</a>
        <a href="Calendar.html">Calendar</a>
        <a href="tasks.html">Tasks</a>
        <a href="Account.html">Account</a>
      </div>
    </nav>

    <main class="app-main">
      <h2>Account</h2>

      <div class="account-page-wrap">
        <!-- Top summary card -->
        <section class="account-section account-summary-card">
          <div class="account-summary-left">
            <img
              src="tasktopus_logo.png"
              alt="Tasktopus logo"
              class="brand-logo small-logo"
            />
            <div>
              <h3>Account Info</h3>
              <p class="account-subtext">
                Manage your Tasktopus account settings.
              </p>
            </div>
          </div>

          <div class="account-summary-right">
            <p class="account-info-row">
              Signed in as: <span id="displayEmail">Loading...</span>
            </p>
          </div>
        </section>

        <!-- Bottom two-card layout -->
        <div class="account-grid">
          <section class="account-section">
            <h3>Change Password</h3>

            <label class="account-label" for="newPassword">New Password</label>
            <input
              class="account-input"
              id="newPassword"
              type="password"
              placeholder="Enter new password (min 6 chars)"
            />

            <label class="account-label" for="confirmPassword">
              Confirm Password
            </label>
            <input
              class="account-input"
              id="confirmPassword"
              type="password"
              placeholder="Re-enter new password"
            />

            <button class="account-btn" onclick="handleChangePassword()">
              Update Password
            </button>

            <p class="account-status" id="passwordStatus"></p>
          </section>

          <section class="account-section account-side-card">
            <h3>Sign Out</h3>
            <p class="account-subtext left-text">
              Sign out of your Tasktopus account on this device.
            </p>

            <button
              class="account-btn account-btn-danger"
              onclick="handleSignOut()"
            >
              Sign Out
            </button>
          </section>
        </div>
      </div>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        signOut,
        updatePassword,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCdpmhy5cSR7P2r2qDY3asX0EUAeOl9KMI",
        authDomain: "tasktopus-capstone.firebaseapp.com",
        projectId: "tasktopus-capstone",
        storageBucket: "tasktopus-capstone.firebasestorage.app",
        messagingSenderId: "87561286935",
        appId: "1:87561286935:web:43d7aa9e420c79da23f352",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      onAuthStateChanged(auth, (user) => {
        if (!user) {
          window.location.href = "index.html";
          return;
        }

        document.getElementById("displayEmail").textContent = user.email;
      });

      window.handleChangePassword = async function () {
        const newPass = document.getElementById("newPassword").value;
        const confirmPass = document.getElementById("confirmPassword").value;
        const status = document.getElementById("passwordStatus");

        if (newPass.length < 6) {
          showStatus(
            status,
            "Password must be at least 6 characters.",
            "error",
          );
          return;
        }

        if (newPass !== confirmPass) {
          showStatus(status, "Passwords do not match.", "error");
          return;
        }

        try {
          await updatePassword(auth.currentUser, newPass);
          showStatus(status, "Password updated successfully!", "success");
          document.getElementById("newPassword").value = "";
          document.getElementById("confirmPassword").value = "";
        } catch (err) {
          showStatus(status, err.message, "error");
        }
      };

      window.handleSignOut = async function () {
        if (!confirm("Are you sure you want to sign out?")) return;

        await signOut(auth);
        window.location.href = "index.html";
      };

      function showStatus(el, msg, type) {
        el.textContent = msg;
        el.className = `account-status ${type}`;

        setTimeout(() => {
          el.textContent = "";
          el.className = "account-status";
        }, 5000);
      }
    </script>
  </body>
</html>
