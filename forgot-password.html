<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="auth-page dashboard-login-page">
    <header class="app-topbar auth-topbar">
      <div class="topbar-left">
        <a href="index.html" class="brand-wrap">
          <img
            src="tasktopus_logo.png"
            alt="Tasktopus logo"
            class="brand-logo small-logo"
          />
        </a>
      </div>
      <div class="topbar-center">
        <h1 class="topbar-title">Tasktopus</h1>
      </div>
      <div class="topbar-right"></div>
    </header>

    <main class="auth-main">
      <div class="auth-page-header">
        <h2>Reset your password</h2>
        <p class="auth-subtext">Enter the email attached to your account.</p>
      </div>

      <div class="login-container auth-card login-card-enhanced">
        <form id="resetForm">
          <label for="resetEmail">Email</label>
          <input
            id="resetEmail"
            type="email"
            placeholder="Enter your email"
            required
          />
          <button type="submit">Send Reset Code</button>
          <p id="resetMessage"></p>
          <p class="auth-footer-text">
            <a href="index.html">Return to Login</a>
          </p>
        </form>
      </div>
    </main>
    <script type="module" src="login.js"></script>
  </body>
</html>
